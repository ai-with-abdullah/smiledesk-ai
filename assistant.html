<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Receptionist — SmileDesk AI</title>
<meta name="description" content="Chat with this business's 24/7 virtual receptionist. Ask questions, check hours, and book an appointment instantly.">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#eef2f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
  .frame{width:100%;max-width:480px;height:min(680px,calc(100vh - 80px));background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(11,31,58,.18);display:flex;flex-direction:column;overflow:hidden}
  .head{padding:18px 22px;color:#fff}
  .head b{font-size:1.1rem}
  .head small{display:block;font-size:.8rem;opacity:.85}
  .body{flex:1;overflow-y:auto;padding:16px;background:#f5f7fb;display:flex;flex-direction:column;gap:8px}
  .m{max-width:82%;padding:10px 14px;border-radius:14px;font-size:.95rem;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
  .m.u{align-self:flex-end;color:#fff;border-bottom-right-radius:4px}
  .m.a{align-self:flex-start;background:#fff;color:#1c2733;border:1px solid #e4e9f1;border-bottom-left-radius:4px}
  .foot{display:flex;gap:8px;padding:12px;border-top:1px solid #e4e9f1;background:#fff}
  .in{flex:1;border:1.5px solid #dbe3ee;border-radius:22px;padding:11px 15px;font-size:.95rem;outline:none}
  .send{border:none;border-radius:22px;color:#fff;font-weight:700;padding:0 20px;cursor:pointer}
  .brand{margin-top:14px;font-size:.8rem;color:#8194aa}
  .brand a{color:#1766ff;font-weight:600;text-decoration:none}
  .center-msg{margin:auto;text-align:center;color:#5b6b7c;padding:30px}
</style>
</head>
<body>
<div class="frame">
  <div class="head" id="head" style="background:#1766ff"><b id="bname">Loading…</b><small>Virtual receptionist · replies instantly · available 24/7</small></div>
  <div class="body" id="body"><div class="center-msg" id="loading">Connecting…</div></div>
  <div class="foot">
    <input class="in" id="in" placeholder="Type your message…" maxlength="1000" disabled>
    <button class="send" id="send" style="background:#1766ff" disabled>Send</button>
  </div>
</div>
<p class="brand">⚡ Powered by <a href="app.html">SmileDesk AI</a> — create your own free assistant in 2 minutes</p>

<script>
var q = new URLSearchParams(location.search);
var ID = q.get("id"), API = (q.get("api") || "").replace(/\/$/, "");
var msgs = [], busy = false, color = "#1766ff";
var body = document.getElementById("body"), input = document.getElementById("in"), send = document.getElementById("send");

function add(role, text) {
  var d = document.createElement("div");
  d.className = "m " + (role === "user" ? "u" : "a");
  if (role === "user") d.style.background = color;
  d.textContent = text;
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
  return d;
}

if (!ID || !API) {
  document.getElementById("loading").textContent = "Invalid assistant link.";
} else {
  fetch(API + "/api/config?id=" + encodeURIComponent(ID))
    .then(function (r) { return r.json(); })
    .then(function (c) {
      if (!c.business_name) throw new Error();
      color = c.color || color;
      document.getElementById("bname").textContent = c.business_name;
      document.getElementById("head").style.background = color;
      send.style.background = color;
      document.title = c.business_name + " — Virtual Receptionist";
      document.getElementById("loading").remove();
      input.disabled = false; send.disabled = false;
      add("assistant", "Hi! 👋 Welcome to " + c.business_name + ". How can I help you today — questions or booking an appointment?");
      input.focus();
    })
    .catch(function () { document.getElementById("loading").textContent = "Assistant not found — please check your link."; });
}

function submit() {
  var text = input.value.trim();
  if (!text || busy) return;
  input.value = "";
  add("user", text);
  msgs.push({ role: "user", content: text });
  busy = true;
  var typing = add("assistant", "…");
  fetch(API + "/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: ID, messages: msgs })
  })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      typing.textContent = d.reply || "Sorry, please try again.";
      msgs.push({ role: "assistant", content: typing.textContent });
    })
    .catch(function () { typing.textContent = "Connection problem — please try again."; })
    .finally(function () { busy = false; });
}
send.addEventListener("click", submit);
input.addEventListener("keydown", function (e) { if (e.key === "Enter") submit(); });
</script>
</body>
</html>
